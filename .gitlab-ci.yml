include:
  - project: devops/ci-template
    ref: v1.0.0
    file: GitlabFlow/Deploy-custom.yml

build-and-test:
  stage: build
  image:
    name: nexus.barrage.net:13455/barrage-internal/ubuntu-java-17-dind
  tags:
    - docker-executor
  variables:
    DOCKER_HOST: "tcp://docker:2375"
    DOCKER_TLS_CERTDIR: ""
    TESTCONTAINERS_STARTUP_TIMEOUT: "120"
    TESTCONTAINERS_RYUK_DISABLED: "true"
  services:
    - name: docker:dind-rootless
      alias: docker
  script:
    - screen -d -m /usr/local/bin/dockerd
    - cp gradle.example.properties gradle.properties
    - cp config/application.example.yaml config/application.yaml
    - ./gradlew test
    - ./gradlew buildFatJar
  artifacts:
    paths:
      - build/libs/

containerize:
  stage: build
  needs:
    - build-and-test
  extends: .build
  rules:
    - !reference [ .build, rules ]
    - when: on_success

review:
  extends: .review_app_staging
  needs:
    - containerize
  variables:
    HELM_RELEASE_NAME: kappi
  environment:
    on_stop: cleanup
  rules:
    - !reference [ '.review_app', 'rules' ]
    - when: on_success

cleanup:
  extends: .stop_review_staging
  variables:
    HELM_RELEASE_NAME: kubetest
  rules:
    - !reference [ '.stop_review', 'rules' ]
    - when: manual

deploy stg:
  extends: .pre-production
  variables:
    HELM_RELEASE_NAME: kappi
  needs:
    - containerize
  rules:
    - !reference [ .development, rules ]
    - when: on_success
